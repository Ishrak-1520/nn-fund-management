[options]
; Database settings (will be overridden by render-entrypoint.sh)
admin_passwd = admin
db_host = localhost
db_port = 5432
db_user = odoo
db_password = odoo
db_name = False

; Addons path
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; Server settings
http_port = 8069
proxy_mode = True
without_demo = False

; Logging
log_level = info
logfile =

; Performance
workers = 0
max_cron_threads = 1
limit_memory_hard = 536870912
limit_memory_soft = 419430400
limit_time_cpu = 600
limit_time_real = 1200
